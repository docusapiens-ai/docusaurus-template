name: Docker Publish

# Triggers:
#   • push to main      → publishes image tagged as "latest"
#   • push of v*.*.*    → publishes image tagged with the semver version (e.g. "1.2.3")
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: europe-west1-docker.pkg.dev/docusaurus-ai/docusapiens-ai
  IMAGE:    docusaurus-template

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Resolve the Docker tag:
      #   - semver tag push  → strip the leading "v"  (v1.2.3 → 1.2.3)
      #   - main branch push → "latest"
      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
